<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카오스 벤치마크 (Chaotic Benchmark)</title>
    <script src="https://cdn.jsdelivr.net/npm/p5@1.9.0/lib/p5.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #111; color: #fff; font-family: 'Apple SD Gothic Neo', sans-serif; }
        .ui-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 20px;
            border-radius: 12px;
            backdrop-filter: blur(10px);
            border: 1px solid #444;
            box-shadow: 0 4px 20px rgba(0,0,0,0.6);
            max-width: 320px;
            z-index: 100;
        }
        h1 { margin: 0 0 5px 0; font-size: 22px; color: #ffeb3b; }
        h2 { margin: 0 0 15px 0; font-size: 14px; color: #aaa; font-weight: normal; }
        .stat-group { 
            background: rgba(255,255,255,0.05); 
            padding: 10px; 
            border-radius: 6px; 
            margin-bottom: 15px; 
        }
        .stat-row { display: flex; justify-content: space-between; margin-bottom: 4px; font-size: 13px; }
        .stat-label { color: #ccc; }
        .stat-val { font-family: monospace; font-weight: bold; }
        .stat-val.good { color: #4caf50; }
        .stat-val.warn { color: #ff9800; }
        .stat-val.bad { color: #f44336; }

        .control-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 14px; color: #ddd; }
        input[type=range] { width: 100%; cursor: pointer; }
        .btn-group { display: flex; gap: 5px; }
        button {
            flex: 1;
            background: #333;
            color: #fff;
            border: 1px solid #555;
            padding: 10px 0;
            cursor: pointer;
            border-radius: 4px;
            font-size: 13px;
            transition: 0.2s;
            font-weight: bold;
        }
        button:hover { background: #555; border-color: #777; }
        button.add { background: #1e88e5; border-color: #1e88e5; }
        button.add:hover { background: #1976d2; }
        button.reset { background: #d9534f; border-color: #d9534f; }
        button.reset:hover { background: #c9302c; }
        
        .nav { position: absolute; top: 20px; right: 20px; z-index: 100; }
        .nav a { color: #aaa; text-decoration: none; font-size: 14px; background: rgba(0,0,0,0.5); padding: 5px 10px; border-radius: 4px; }
        .nav a:hover { color: #fff; background: rgba(0,0,0,0.8); }

        @media (max-width: 600px) {
            .ui-panel {
                top: auto;
                bottom: 20px;
                left: 10px;
                right: 10px;
                max-width: none;
                padding: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="nav"><a href="index.html">← 메인으로</a></div>
    
    <div class="ui-panel">
        <h1>카오스 벤치마크</h1>
        <h2>Physics Simulation Stress Test</h2>
        
        <div class="stat-group">
            <div class="stat-row">
                <span class="stat-label">FPS (프레임):</span>
                <span class="stat-val" id="fpsDisplay">60</span>
            </div>
            <div class="stat-row">
                <span class="stat-label">Objects (진자):</span>
                <span class="stat-val" id="countDisplay">1</span>
            </div>
            <div class="stat-row">
                <span class="stat-label">Memory (Heap):</span>
                <span class="stat-val" id="memDisplay">-</span>
            </div>
        </div>

        <div class="control-group">
            <div class="btn-group">
                <button class="add" onclick="addPendulum(100)">+100개 추가</button>
                <button class="add" onclick="addPendulum(500)">+500개</button>
            </div>
        </div>

        <div class="control-group">
            <label>시뮬레이션 속도 (G): <span id="speedVal" style="color:#ffeb3b">1.0</span></label>
            <input type="range" id="speedSlider" min="0.1" max="3.0" step="0.1" value="1.0">
        </div>

        <div class="btn-group">
            <button onclick="clearTrace()">궤적 지우기</button>
            <button class="reset" onclick="resetAll()">초기화</button>
        </div>
    </div>

    <script>
        let pendulums = [];
        let buffer;
        let cx, cy;
        let r1, r2;
        let m1 = 10, m2 = 10; // 벤치마크용으로 질량/크기 조금 줄임
        let g = 1;
        let fpsElem, countElem, memElem;

        function setup() {
            createCanvas(windowWidth, windowHeight);
            setDimensions();
            
            buffer = createGraphics(width, height);
            buffer.background(17);
            
            // UI 요소
            fpsElem = document.getElementById('fpsDisplay');
            countElem = document.getElementById('countDisplay');
            memElem = document.getElementById('memDisplay');
            
            // 첫 진자
            addPendulum(1, true);
            
            // UI 이벤트
            let slider = document.getElementById('speedSlider');
            if (slider) {
                slider.addEventListener('input', (e) => {
                    g = parseFloat(e.target.value);
                    document.getElementById('speedVal').innerText = g.toFixed(1);
                });
            }

            // 0.5초마다 성능 모니터링 업데이트
            setInterval(updateStats, 500);
        }

        function setDimensions() {
            cx = width / 2;
            cy = height / 3;
            let minDim = min(width, height);
            r1 = minDim * 0.18;
            r2 = minDim * 0.18;
        }

        class Pendulum {
            constructor(isFirst) {
                let offset = isFirst ? 0 : random(-0.001, 0.001);
                this.a1 = Math.PI / 2 + offset;
                this.a2 = Math.PI / 2 + offset;
                this.a1_v = 0;
                this.a2_v = 0;
                this.px2 = -1;
                this.py2 = -1;
                this.hue = random(360);
            }

            update() {
                let num1 = -g * (2 * m1 + m2) * sin(this.a1);
                let num2 = -m2 * g * sin(this.a1 - 2 * this.a2);
                let num3 = -2 * sin(this.a1 - this.a2) * m2;
                let num4 = this.a2_v * this.a2_v * r2 + this.a1_v * this.a1_v * r1 * cos(this.a1 - this.a2);
                let den = r1 * (2 * m1 + m2 - m2 * cos(2 * this.a1 - 2 * this.a2));
                let a1_a = (num1 + num2 + num3 * num4) / den;

                num1 = 2 * sin(this.a1 - this.a2);
                num2 = (this.a1_v * this.a1_v * r1 * (m1 + m2));
                num3 = g * (m1 + m2) * cos(this.a1);
                num4 = this.a2_v * this.a2_v * r2 * m2 * cos(this.a1 - this.a2);
                den = r2 * (2 * m1 + m2 - m2 * cos(2 * this.a1 - 2 * this.a2));
                let a2_a = (num1 * (num2 + num3 + num4)) / den;

                this.a1_v += a1_a;
                this.a2_v += a2_a;
                this.a1 += this.a1_v;
                this.a2 += this.a2_v;
                this.a1_v *= 0.999;
                this.a2_v *= 0.999;
            }

            draw() {
                let x1 = r1 * sin(this.a1);
                let y1 = r1 * cos(this.a1);
                let x2 = x1 + r2 * sin(this.a2);
                let y2 = y1 + r2 * cos(this.a2);

                push();
                translate(cx, cy);
                
                // 성능 위해 선은 가늘게, 원은 생략하거나 작게 (대량 렌더링 최적화)
                stroke(255, 30); // 매우 투명하게
                strokeWeight(1);
                line(0, 0, x1, y1);
                line(x1, y1, x2, y2);
                
                // 원은 성능을 많이 먹으므로 500개 미만일 때만 그림
                if (pendulums.length < 500) {
                    noStroke();
                    fill(this.hue, 80, 100);
                    colorMode(HSB);
                    ellipse(x2, y2, 6, 6); // 추 크기 축소
                }
                pop();

                if (this.px2 !== -1) {
                    buffer.push();
                    buffer.translate(cx, cy);
                    buffer.colorMode(HSB);
                    let vel = abs(this.a1_v) + abs(this.a2_v);
                    let alpha = map(vel, 0, 0.5, 0.1, 0.5);
                    buffer.stroke(this.hue, 80, 100, alpha);
                    buffer.strokeWeight(2); // 궤적 두께 조정
                    buffer.line(this.px2, this.py2, x2, y2);
                    buffer.pop();
                }
                this.px2 = x2;
                this.py2 = y2;
            }
        }

        function draw() {
            image(buffer, 0, 0);
            for (let p of pendulums) {
                p.update();
                p.draw();
            }
        }

        function addPendulum(count = 1, isFirst = false) {
            for(let i=0; i<count; i++) {
                pendulums.push(new Pendulum(isFirst && i===0));
            }
            updateStats();
        }

        function resetAll() {
            pendulums = [];
            addPendulum(1, true);
            clearTrace();
        }

        function clearTrace() {
            if (buffer) buffer.background(17);
        }

        function updateStats() {
            // FPS
            let fps = frameRate();
            fpsElem.innerText = fps.toFixed(1);
            if (fps >= 50) fpsElem.className = 'stat-val good';
            else if (fps >= 30) fpsElem.className = 'stat-val warn';
            else fpsElem.className = 'stat-val bad';

            // Count
            countElem.innerText = pendulums.length + ' 개';

            // Memory (Chrome/Edge only)
            if (performance && performance.memory) {
                let used = Math.round(performance.memory.usedJSHeapSize / 1048576);
                let total = Math.round(performance.memory.jsHeapSizeLimit / 1048576);
                memElem.innerText = `${used} MB / ${total} MB`;
            } else {
                memElem.innerText = '지원안함';
            }
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
            setDimensions();
            buffer = createGraphics(width, height);
            buffer.background(17);
        }
    </script>
</body>
</html>
