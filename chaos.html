<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카오스 진자 (Chaotic Pendulum)</title>
    <script src="https://cdn.jsdelivr.net/npm/p5@1.9.0/lib/p5.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #111; color: #fff; font-family: 'Apple SD Gothic Neo', sans-serif; }
        .ui-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.6);
            padding: 20px;
            border-radius: 12px;
            backdrop-filter: blur(8px);
            border: 1px solid #444;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            max-width: 300px;
            z-index: 100;
        }
        @media (max-width: 600px) {
            .ui-panel {
                top: auto;
                bottom: 20px;
                left: 20px;
                right: 20px;
                max-width: none;
                padding: 15px;
            }
            h1 { font-size: 18px; margin-bottom: 2px; }
            h2 { font-size: 12px; margin-bottom: 10px; }
            .desc { display: none; } /* 모바일에서는 설명 숨김 */
            .btn-group button { padding: 10px 0; } /* 터치 영역 확대 */
            .nav { top: 10px; right: 10px; }
        }
        h1 { margin: 0 0 5px 0; font-size: 22px; color: #ffeb3b; }
        h2 { margin: 0 0 15px 0; font-size: 14px; color: #aaa; font-weight: normal; }
        .control-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 14px; color: #ddd; }
        input[type=range] { width: 100%; cursor: pointer; }
        .btn-group { display: flex; gap: 5px; }
        button {
            flex: 1;
            background: #333;
            color: #fff;
            border: 1px solid #555;
            padding: 8px 0;
            cursor: pointer;
            border-radius: 4px;
            font-size: 13px;
            transition: 0.2s;
        }
        button:hover { background: #555; border-color: #777; }
        button.primary { background: #d9534f; border-color: #d9534f; }
        button.primary:hover { background: #c9302c; }
        
        .desc { font-size: 12px; color: #888; line-height: 1.5; margin-top: 15px; border-top: 1px solid #444; padding-top: 10px; }
        .nav { position: absolute; top: 20px; right: 20px; z-index: 100; }
        .nav a { color: #aaa; text-decoration: none; font-size: 14px; background: rgba(0,0,0,0.5); padding: 5px 10px; border-radius: 4px; }
        .nav a:hover { color: #fff; background: rgba(0,0,0,0.8); }
    </style>
</head>
<body>
    <div class="nav"><a href="index.html">← 메인으로</a></div>
    
    <div class="ui-panel">
        <h1>카오스 진자</h1>
        <h2>Double Pendulum Simulation</h2>
        
        <div class="control-group">
            <label>속도 (중력 G): <span id="speedVal" style="color:#ffeb3b">1.0</span></label>
            <input type="range" id="speedSlider" min="0.1" max="3.0" step="0.1" value="1.0">
        </div>

        <div class="control-group">
            <label>현재 진자 수: <span id="countVal" style="color:#4fc3f7">1</span>개</label>
            <div class="btn-group">
                <button onclick="addPendulum()">+ 추가</button>
                <button onclick="addPendulum(5)">+5개</button>
            </div>
        </div>

        <div class="btn-group">
            <button onclick="clearTrace()">궤적 지우기</button>
            <button class="primary" onclick="resetAll()">초기화</button>
        </div>

        <div class="desc">
            <strong>나비 효과 (Butterfly Effect)</strong><br>
            진자를 여러 개 추가해 보세요. 처음엔 똑같이 움직이는 것 같지만, 미세한 차이가 시간이 지날수록 완전히 다른 결과를 만들어냅니다.
        </div>
    </div>

    <script>
        let pendulums = [];
        let buffer;
        let cx, cy;
        let r1 = 125, r2 = 125;
        let m1 = 20, m2 = 20;
        let g = 1;

        function setup() {
            createCanvas(windowWidth, windowHeight);
            cx = width / 2;
            cy = height / 3;
            buffer = createGraphics(width, height);
            buffer.background(17);
            
            // 첫 진자 생성
            addPendulum(1, true);
            
            // UI 이벤트 연결
            let slider = document.getElementById('speedSlider');
            if (slider) {
                slider.addEventListener('input', (e) => {
                    g = parseFloat(e.target.value);
                    let valDisplay = document.getElementById('speedVal');
                    if (valDisplay) valDisplay.innerText = g.toFixed(1);
                });
            }
        }

        class Pendulum {
            constructor(isFirst) {
                let offset = isFirst ? 0 : random(-0.001, 0.001);
                this.a1 = Math.PI / 2 + offset;
                this.a2 = Math.PI / 2 + offset;
                this.a1_v = 0;
                this.a2_v = 0;
                this.px2 = -1;
                this.py2 = -1;
                this.hue = random(360);
            }

            update() {
                let num1 = -g * (2 * m1 + m2) * sin(this.a1);
                let num2 = -m2 * g * sin(this.a1 - 2 * this.a2);
                let num3 = -2 * sin(this.a1 - this.a2) * m2;
                let num4 = this.a2_v * this.a2_v * r2 + this.a1_v * this.a1_v * r1 * cos(this.a1 - this.a2);
                let den = r1 * (2 * m1 + m2 - m2 * cos(2 * this.a1 - 2 * this.a2));
                let a1_a = (num1 + num2 + num3 * num4) / den;

                num1 = 2 * sin(this.a1 - this.a2);
                num2 = (this.a1_v * this.a1_v * r1 * (m1 + m2));
                num3 = g * (m1 + m2) * cos(this.a1);
                num4 = this.a2_v * this.a2_v * r2 * m2 * cos(this.a1 - this.a2);
                den = r2 * (2 * m1 + m2 - m2 * cos(2 * this.a1 - 2 * this.a2));
                let a2_a = (num1 * (num2 + num3 + num4)) / den;

                this.a1_v += a1_a;
                this.a2_v += a2_a;
                this.a1 += this.a1_v;
                this.a2 += this.a2_v;
                
                this.a1_v *= 0.999;
                this.a2_v *= 0.999;
            }

            draw() {
                let x1 = r1 * sin(this.a1);
                let y1 = r1 * cos(this.a1);
                let x2 = x1 + r2 * sin(this.a2);
                let y2 = y1 + r2 * cos(this.a2);

                push();
                translate(cx, cy);
                
                stroke(255, 30);
                strokeWeight(1);
                line(0, 0, x1, y1);
                line(x1, y1, x2, y2);
                
                noStroke();
                fill(255, 200);
                ellipse(x1, y1, 6, 6);
                
                colorMode(HSB);
                fill(this.hue, 80, 100);
                ellipse(x2, y2, 8, 8);
                pop();

                if (this.px2 !== -1) {
                    buffer.push();
                    buffer.translate(cx, cy);
                    buffer.colorMode(HSB);
                    let vel = abs(this.a1_v) + abs(this.a2_v);
                    let alpha = map(vel, 0, 0.5, 0.1, 0.6);
                    buffer.stroke(this.hue, 80, 100, alpha);
                    buffer.strokeWeight(1.5);
                    buffer.line(this.px2, this.py2, x2, y2);
                    buffer.pop();
                }
                this.px2 = x2;
                this.py2 = y2;
            }
        }

        function draw() {
            image(buffer, 0, 0);
            for (let p of pendulums) {
                p.update();
                p.draw();
            }
        }

        function addPendulum(count = 1, isFirst = false) {
            for(let i=0; i<count; i++) {
                pendulums.push(new Pendulum(isFirst && i===0));
            }
            let countDisplay = document.getElementById('countVal');
            if (countDisplay) countDisplay.innerText = pendulums.length;
        }

        function resetAll() {
            pendulums = [];
            addPendulum(1, true);
            clearTrace();
        }

        function clearTrace() {
            if (buffer) buffer.background(17);
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
            cx = width / 2;
            cy = height / 3;
            buffer = createGraphics(width, height);
            buffer.background(17);
        }
    </script>
</body>
</html>
